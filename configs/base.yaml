benchmark: terminalbench
algorithm: grpo

model:
  name: Qwen/Qwen2.5-0.5B-Instruct

training:
  max_steps: 100
  batch_size: 2
  learning_rate: 1.0e-5

generation:
  max_new_tokens: 16
  do_sample: false

environment:
  max_episode_steps: 20

reward:
  success_reward: 1.0
  failure_reward: 0.0
  step_penalty: 0.01